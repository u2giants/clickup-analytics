# Directus PM system — production deploy (Postgres). Suitable for Coolify.
# 1) copy .env.example -> .env and fill in (esp. KEY, SECRET, ADMIN_*, R2, SSO).
# 2) deploy. 3) run apply-schema.mjs against it. 4) restart the directus service.
services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pm-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-directus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_DATABASE:-directus}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${KEY:?set KEY}
      SECRET: ${SECRET:?set SECRET}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8055}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD}
      # --- Open Innovation Grant license key (uncomment once you have it) ---
      # LICENSE_KEY: ${LICENSE_KEY}
      # --- File storage on Cloudflare R2 (S3-compatible) ---
      STORAGE_LOCATIONS: ${STORAGE_LOCATIONS:-r2}
      STORAGE_R2_DRIVER: ${STORAGE_R2_DRIVER:-s3}
      STORAGE_R2_KEY: ${STORAGE_R2_KEY}
      STORAGE_R2_SECRET: ${STORAGE_R2_SECRET}
      STORAGE_R2_BUCKET: ${STORAGE_R2_BUCKET}
      STORAGE_R2_ENDPOINT: ${STORAGE_R2_ENDPOINT}
      STORAGE_R2_REGION: ${STORAGE_R2_REGION:-auto}
      # --- Microsoft Entra SSO (OIDC) — works on Core+OIG. See README. ---
      # AUTH_PROVIDERS: microsoft
      # AUTH_MICROSOFT_DRIVER: openid
      # AUTH_MICROSOFT_CLIENT_ID: ${MS_CLIENT_ID}
      # AUTH_MICROSOFT_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      # AUTH_MICROSOFT_ISSUER_URL: https://login.microsoftonline.com/${MS_TENANT_ID}/v2.0/.well-known/openid-configuration
      # AUTH_MICROSOFT_IDENTIFIER_KEY: email
      # AUTH_MICROSOFT_ALLOW_PUBLIC_REGISTRATION: "false"
      TELEMETRY: "false"

volumes:
  pm-pgdata:
